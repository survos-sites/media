add_header X-Frame-Options "SAMEORIGIN";
add_header X-Content-Type-Options "nosniff";

index index.php;

charset utf-8;

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types application/javascript application/json application/manifest+json
           image/svg+xml text/css text/plain;

# Symfony AssetMapper output: versioned filenames, cache forever
# Serve pre-compressed .gz files generated by asset-map:compile --precompress
location ^~ /assets/ {
    expires max;
    add_header Cache-Control "public, immutable";
    access_log off;

    gzip_static on;
}

# Symfony front controller
location / {
    try_files $uri /index.php$is_args$args;
}

location = /favicon.ico { access_log off; log_not_found off; }
location = /robots.txt  { access_log off; log_not_found off; }

error_page 404 /index.php;

location ~ /\.(?!well-known) {
    deny all;
}
