# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Trust only the local reverse proxy by default.
    # Do NOT trust REMOTE_ADDR here: it can allow client-supplied forwarded
    # headers to influence scheme/host (http vs https) and redirect URLs.
    # If the app is directly behind Cloudflare, replace this with the
    # Cloudflare CIDR list (or inject via env at deploy time).
    trusted_proxies: '127.0.0.1,::1'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-prefix']

    # Note that the session will be started ONLY if you read or write from it.
    session: true
    router:
        default_uri: 'https://mediary.survos.com'

    #esi: true
    #fragments: true
    http_client:
        default_options:
            max_redirects: 8
            timeout: 30
            proxy: '%env(HTTP_PROXY)%'

#    error_controller: App\Controller\ErrorController::show

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file

when@dev:
    framework:
        router:
            default_uri: 'https://media.wip'
