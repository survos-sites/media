survos_meili:
  host: '%env(MEILI_SERVER)%'
  apiKey: '%env(default::MEILI_API_KEY)%'
  chat:
    workspaces:
      meili_assistant:
        apiKey: '%env(OPENAI_API_KEY)%'
        model: 'gpt-4o-mini'
        label: 'Media'
        examples:
          - 'Tell me about this collection.'
          - 'Show me a few unusual assets.'
          - 'Give me a short overview of the file and storage indexes.'
          - 'Find a few items a teacher could use to introduce visual literacy.'
