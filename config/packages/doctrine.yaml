doctrine:
    dbal:
        # SurvosDatasetBundle adds a second 'dataset' (pdo_sqlite) connection, so the
        # default can no longer be inferred from the `url` shorthand — it must be named
        # and pinned, or the sqlite registry silently becomes the app default.
        default_connection: default
        connections:
            default:
                url: '%env(resolve:DATABASE_URL)%'
                schema_filter: '~^(?!(?:_timescaledb_|timescaledb_|toolkit_))~'

                # IMPORTANT: You MUST configure your server version,
                # either here or in the DATABASE_URL env var (see .env file)
                #server_version: '16'

                profiling_collect_backtrace: '%kernel.debug%'
                logging: false # otherwise logs are huge
            # 'dataset' (pdo_sqlite) connection is added by SurvosDatasetBundle.

    orm:
        default_entity_manager: default
        entity_managers:
            default:
                connection: default
                validate_xml_mapping: true
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                identity_generation_preferences:
                    Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App
            # 'dataset' entity manager is added by SurvosDatasetBundle.

when@test:
    doctrine:
        dbal:
            connections:
                default:
                    # "TEST_TOKEN" is typically set by ParaTest
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            entity_managers:
                default:
                    metadata_cache_driver:
                        type: pool
                        pool: doctrine.system_cache_pool
                    query_cache_driver:
                        type: pool
                        pool: doctrine.system_cache_pool
                    result_cache_driver:
                        type: pool
                        pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
