# Read the documentation at https://github.com/thephpleague/flysystem-bundle/blob/master/docs/1-getting-started.md
services:
    Aws\S3\S3Client:
        arguments:
            - version: '2006-03-01'
              region: 'fsn1' # for now, ignored by hetzner
#              region: 'nyc3' # digital Ocean
              endpoint: '%env(S3_ENDPOINT)%'
              use_path_style_endpoint: true
              credentials:
                  key: '%env(AWS_S3_ACCESS_ID)%'
                  secret: '%env(AWS_S3_ACCESS_SECRET)%'


flysystem:
    storages:
        archive.storage:
            aws:
                client: 'Aws\S3\S3Client' # The service ID of the Aws\S3\S3Client instance
                bucket: '%env(AWS_S3_BUCKET_NAME)%'
                streamReads: true
                prefix: '%env(string:S3_STORAGE_PREFIX)%'
        # also on production, for thumbnail creation. Points at public/ (writable,
        # same as dev) rather than APP_DATA_DIR — /platform is the shared md-owned
        # mount and mediary's container user can't mkdir there.
        local.storage:
            local:
                directory: '%kernel.project_dir%/public'

when@test:
    flysystem:
        storages:
            archive.storage:
                memory: ~
            # also on production, for thumbnail creation
            local.storage:
                memory: ~

when@dev:
    flysystem:
        storages:
            local.storage:
                local:
                    directory: '%kernel.project_dir%/public'
